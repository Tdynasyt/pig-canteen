<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PIGGY CANTEEN · Family Kitchen</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #FFF5F0;
  --warm-yellow: #FFE8D6;
  --pink: #FF9E9E;
  --deep-pink: #FF6B6B;
  --brown: #B0886A;
  --dark-brown: #5D3A1A;
  --soft-pink: #FFD4D4;
  --white: #FFFFFF;
  --shadow: 0 4px 16px rgba(93, 58, 26, 0.07);
  --radius: 20px;
  --radius-sm: 12px;
}

body {
  font-family: 'ZCOOL KuaiLe', 'PingFang SC', 'Microsoft YaHei', cursive, sans-serif;
  min-height: 100vh;
  color: var(--dark-brown);
  padding-bottom: 100px;
  background: #FFF0E8 fixed;
  /* GPU-friendly: single pseudo-element for blobs instead of 5 stacked gradients */
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}

/* Pseudo-element replaces stacked radial-gradient layers → 1 paint surface */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 420px 320px at 18% 25%, var(--blob1, rgba(255,154,139,0.13)) 0%, transparent 100%),
    radial-gradient(ellipse 360px 380px at 82% 55%, var(--blob2, rgba(255,179,71,0.09)) 0%, transparent 100%),
    radial-gradient(ellipse 280px 320px at 50% 85%, var(--blob3, rgba(255,130,130,0.08)) 0%, transparent 100%);
  will-change: transform;
}

/* ── Floating Pig Emojis (GPU-composited) ── */
.float-emoji {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  font-size: 80px;
  opacity: 0.10;
  will-change: transform;
  transform: translateZ(0);
}
.float-emoji.a { top: 10%; left: 5%;  animation: floatA 10s ease-in-out infinite; }
.float-emoji.b { top: 6%;  right: 5%; font-size: 100px; animation: floatB 12s ease-in-out infinite; }
.float-emoji.c { bottom: 22%; left: 3%; font-size: 65px; animation: floatA 9s ease-in-out infinite 3s; }
.float-emoji.d { bottom: 14%; right: 8%; font-size: 75px; animation: floatB 11s ease-in-out infinite 4s; }

@keyframes floatA { 0%,100%{transform:translateZ(0) translateY(0) rotate(0deg)} 50%{transform:translateZ(0) translateY(-18px) rotate(6deg)} }
@keyframes floatB { 0%,100%{transform:translateZ(0) translateY(0) rotate(0deg)} 50%{transform:translateZ(0) translateY(-22px) rotate(-7deg)} }

/* ── Header ── */
header {
  text-align: center;
  padding: 32px 16px 12px;
  position: relative;
  z-index: 1;
}

.logo {
  font-size: 90px;
  display: block;
  margin: 0 auto;
  animation: wiggle 3s ease-in-out infinite;
  will-change: transform;
  transform: translateZ(0);
  text-shadow: 0 3px 12px rgba(255,107,107,0.15);
}

@keyframes wiggle {
  0%, 100% { transform: translateZ(0) rotate(0deg); }
  25% { transform: translateZ(0) rotate(-8deg); }
  75% { transform: translateZ(0) rotate(8deg); }
}

h1 {
  font-size: 32px;
  color: var(--deep-pink);
  margin-top: 0;
  letter-spacing: 3px;
}

.subtitle {
  font-size: 15px;
  color: #C9A890;
  margin-top: 2px;
}

.doodle-divider {
  text-align: center;
  font-size: 22px;
  letter-spacing: 6px;
  margin: 8px 0 16px;
  position: relative;
  z-index: 1;
  opacity: 0.6;
}

/* ── Category Tabs ── */
.categories {
  display: flex;
  gap: 10px;
  padding: 0 16px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  justify-content: center;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

.categories::-webkit-scrollbar { display: none; }

.cat-btn {
  padding: 8px 18px;
  border-radius: 50px;
  border: 2.5px dashed var(--pink);
  background: var(--white);
  color: var(--brown);
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
  transition: transform 0.15s, background 0.15s, border-color 0.15s;
  letter-spacing: 1px;
}

.cat-btn.active {
  background: var(--deep-pink);
  color: white;
  border-style: solid;
  border-color: var(--deep-pink);
  box-shadow: 0 4px 12px rgba(255,107,107,0.3);
  transform: scale(1.05);
}

/* ── Menu Grid ── */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
  padding: 20px 16px;
  position: relative;
  z-index: 1;
}

.dish-card {
  background: rgba(255,255,255,0.92);
  border-radius: var(--radius);
  padding: 18px 14px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(93,58,26,0.05);
  border: 2px solid transparent;
  transition: transform 0.15s, border-color 0.15s;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  /* GPU composite layer + containment for fast scroll */
  contain: layout style paint;
  content-visibility: auto;
  contain-intrinsic-size: 160px;
  will-change: transform;
  transform: translateZ(0);
}

.dish-card .has-note-dot {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 10px;
  height: 10px;
  background: var(--deep-pink);
  border-radius: 50%;
  z-index: 2;
  display: none;
}

.dish-card.has-note .has-note-dot { display: block; }

.dish-card::after {
  content: '';
  position: absolute;
  top: -24px;
  right: -24px;
  width: 56px;
  height: 56px;
  background: var(--warm-yellow);
  border-radius: 50%;
  opacity: 0;
  transition: all 0.3s;
}

.dish-card:active::after {
  opacity: 0.5;
  transform: scale(4);
}

.dish-card:active {
  border-color: var(--deep-pink);
  transform: scale(0.97);
}

.dish-emoji {
  font-size: 52px;
  display: block;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
  line-height: 1.2;
}

.food-img-wrap {
  width: 100%;
  height: 110px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
  background: #F8F0E8;
}

.food-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s;
}

.dish-card:active .food-img { transform: scale(1.08); }

.food-img-fallback {
  display: none;
  font-size: 52px;
  position: absolute;
  inset: 0;
  align-items: center;
  justify-content: center;
}

.dish-name {
  font-size: 15px;
  font-weight: bold;
  color: var(--dark-brown);
  margin-bottom: 4px;
  position: relative;
  z-index: 1;
}

.dish-price {
  font-size: 18px;
  color: var(--deep-pink);
  position: relative;
  z-index: 1;
}

.dish-price::before {
  content: '¥';
  font-size: 12px;
}

/* ── Cart ── */
.cart-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255,255,255,0.97);
  border-radius: var(--radius) var(--radius) 0 0;
  box-shadow: 0 -2px 16px rgba(93,58,26,0.08);
  padding: 14px 20px;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  will-change: transform;
  transform: translateZ(0);
}

.cart-info { flex: 1; }

.cart-title {
  font-size: 14px;
  color: var(--brown);
  display: flex;
  align-items: center;
  gap: 6px;
}

.cart-count {
  background: var(--deep-pink);
  color: white;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: transform 0.15s ease;
  will-change: transform;
}

.cart-total {
  font-size: 22px;
  font-weight: bold;
  color: var(--dark-brown);
}

.checkout-btn {
  background: var(--deep-pink);
  color: white;
  border: none;
  border-radius: 50px;
  padding: 12px 28px;
  font-family: inherit;
  font-size: 16px;
  cursor: pointer;
  letter-spacing: 2px;
  box-shadow: 0 4px 16px rgba(255,107,107,0.35);
  transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
  will-change: transform;
}

.checkout-btn:active { transform: scale(0.95); opacity: 0.85; }

.checkout-btn:disabled {
  background: #E0D5C5;
  box-shadow: none;
  cursor: not-allowed;
  opacity: 0.6;
}

/* ── Dish Note Modal ── */
.dish-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(93, 58, 26, 0.4);
  z-index: 250;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.dish-modal {
  background: var(--white);
  border-radius: var(--radius);
  width: 90%;
  max-width: 360px;
  padding: 28px 24px 24px;
  text-align: center;
  animation: popIn 0.3s ease-out;
  box-shadow: 0 12px 48px rgba(93, 58, 26, 0.2);
}

@keyframes popIn {
  0% { transform: scale(0.8); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.dish-modal .big-emoji { font-size: 68px; display: block; margin-bottom: 8px; }
.dish-modal .big-name { font-size: 20px; color: var(--dark-brown); margin-bottom: 4px; }
.dish-modal .big-price { font-size: 22px; color: var(--deep-pink); margin-bottom: 16px; }

.dish-modal .note-input {
  width: 100%;
  padding: 10px 14px;
  border: 2px dashed var(--warm-yellow);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 14px;
  background: var(--cream);
  color: var(--dark-brown);
  outline: none;
  text-align: center;
  margin-bottom: 20px;
  transition: border-color 0.2s;
}

.dish-modal .note-input:focus {
  border-color: var(--deep-pink);
  border-style: solid;
}

.dish-modal .qty-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
}

.dish-modal .qty-btn-lg {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2.5px solid var(--deep-pink);
  background: transparent;
  color: var(--deep-pink);
  font-size: 22px;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.dish-modal .qty-btn-lg:active { background: var(--deep-pink); color: white; }
.dish-modal .qty-num-lg { font-size: 24px; min-width: 36px; }

.dish-modal .add-btn {
  width: 100%;
  padding: 14px;
  background: var(--deep-pink);
  color: white;
  border: none;
  border-radius: 50px;
  font-family: inherit;
  font-size: 18px;
  cursor: pointer;
  letter-spacing: 2px;
  box-shadow: 0 4px 16px rgba(255,107,107,0.3);
  transition: all 0.2s;
}

.dish-modal .add-btn:active { transform: scale(0.97); }

.dish-modal .cancel-btn {
  margin-top: 10px;
  background: transparent;
  border: none;
  color: #C4A882;
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
}

/* ── Checkout Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(93, 58, 26, 0.4);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn 0.2s;
}

.modal {
  background: var(--white);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px 20px 32px;
  animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.modal-header h2 { font-size: 22px; color: var(--deep-pink); }

.modal-close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px dashed var(--brown);
  background: transparent;
  font-size: 18px;
  color: var(--brown);
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cart-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 0;
  border-bottom: 1.5px dashed #F0E0D5;
  flex-wrap: wrap;
}

.cart-item-main {
  display: flex;
  align-items: center;
  flex: 1;
  min-width: 200px;
}

.cart-item-note {
  width: 100%;
  font-size: 12px;
  color: var(--pink);
  padding-left: 44px;
  padding-bottom: 8px;
}

.cart-item-name { flex: 1; font-size: 15px; }
.cart-item-price { color: var(--brown); margin: 0 12px; font-size: 15px; white-space: nowrap; }
.qty-control { display: flex; align-items: center; gap: 10px; }

.qty-btn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 2px solid var(--deep-pink);
  background: transparent;
  color: var(--deep-pink);
  font-size: 18px;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.qty-btn:active { background: var(--deep-pink); color: white; }
.qty-num { font-size: 16px; min-width: 24px; text-align: center; }

/* ── Order Form ── */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 14px; color: var(--brown); margin-bottom: 6px; }

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 12px 16px;
  border: 2px dashed var(--warm-yellow);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 15px;
  background: var(--cream);
  color: var(--dark-brown);
  transition: border-color 0.2s;
  outline: none;
}

.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--deep-pink);
  border-style: solid;
}

.form-group textarea { resize: none; height: 70px; }

.submit-order-btn {
  width: 100%;
  padding: 14px;
  background: var(--deep-pink);
  color: white;
  border: none;
  border-radius: 50px;
  font-family: inherit;
  font-size: 18px;
  cursor: pointer;
  letter-spacing: 2px;
  box-shadow: 0 4px 16px rgba(255,107,107,0.25);
  transition: all 0.2s;
}

.submit-order-btn:active { transform: scale(0.97); }

/* ── Order Detail Modal ── */
.order-detail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(93, 58, 26, 0.4);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s;
}

.order-detail {
  background: white;
  border-radius: var(--radius);
  width: 92%;
  max-width: 400px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 28px 22px 24px;
  animation: popIn 0.4s ease-out;
  box-shadow: 0 12px 48px rgba(93, 58, 26, 0.2);
}

.order-detail-header {
  text-align: center;
  margin-bottom: 20px;
}

.order-detail-header .od-emoji { font-size: 48px; display: block; margin-bottom: 6px; }
.order-detail-header .od-title { font-size: 20px; color: var(--deep-pink); }
.order-detail-header .od-time { font-size: 12px; color: #C4A882; margin-top: 4px; }

.order-detail-list {
  background: var(--cream);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 16px;
}

.od-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px dashed #ECDDD0;
  font-size: 14px;
}
.od-item:last-child { border-bottom: none; }

.od-item-emoji { font-size: 24px; flex-shrink: 0; }
.od-item-info { flex: 1; }
.od-item-name { color: var(--dark-brown); }
.od-item-note { font-size: 11px; color: var(--pink); }
.od-item-right { text-align: right; flex-shrink: 0; }
.od-item-qty { color: var(--brown); font-size: 13px; }
.od-item-price { color: var(--deep-pink); font-weight: bold; }

.order-detail-total {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0 16px;
  font-size: 20px;
  color: var(--dark-brown);
}
.order-detail-total strong { color: var(--deep-pink); font-size: 24px; }

.od-note-row {
  display: flex;
  gap: 6px;
  font-size: 13px;
  color: var(--brown);
  padding: 8px 14px;
  background: var(--cream);
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
}

.od-btn-row { display: flex; gap: 10px; }

.od-btn {
  flex: 1;
  padding: 12px;
  border-radius: 50px;
  font-family: inherit;
  font-size: 15px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
  text-align: center;
}

.od-btn-copy {
  background: var(--deep-pink);
  color: white;
  border: none;
  box-shadow: 0 4px 16px rgba(255,107,107,0.25);
}
.od-btn-copy:active { transform: scale(0.97); }

.od-btn-close {
  background: transparent;
  color: var(--brown);
  border: 2px solid var(--pink);
}
.od-btn-close:active { background: #FFF0ED; }

.od-copied-hint {
  text-align: center;
  font-size: 12px;
  color: var(--deep-pink);
  margin-top: 8px;
  opacity: 0;
  transition: opacity 0.3s;
}
.od-copied-hint.show { opacity: 1; }

/* ── VIP ── */
.vip-badge {
  display: inline-block;
  background: linear-gradient(135deg, #FFD700, #FFA500);
  color: #5D3A1A;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 50px;
  margin-left: 8px;
  vertical-align: middle;
  letter-spacing: 1px;
  animation: vipGlow 1.5s ease-in-out infinite;
}

@keyframes vipGlow {
  0%, 100% { box-shadow: 0 0 8px rgba(255,215,0,0.4); }
  50% { box-shadow: 0 0 18px rgba(255,215,0,0.7); }
}

.dish-card.vip-only {
  border-color: #FFD700;
  background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,248,220,0.9));
}

.dish-card.vip-only::before {
  content: '👑';
  position: absolute;
  top: 4px;
  left: 8px;
  font-size: 14px;
  z-index: 2;
}

.vip-price-original {
  text-decoration: line-through;
  color: #C4A882;
  font-size: 12px;
  margin-right: 4px;
}

.vip-tag {
  display: inline-block;
  background: #FFD700;
  color: #5D3A1A;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 50px;
  margin-left: 4px;
  vertical-align: middle;
}

.vip-total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: #C4A882;
  margin-bottom: 4px;
}

.vip-welcome-overlay {
  position: fixed;
  inset: 0;
  background: rgba(93, 58, 26, 0.5);
  z-index: 400;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.3s;
}

.vip-welcome {
  background: white;
  border-radius: var(--radius);
  width: 90%;
  max-width: 340px;
  padding: 32px 24px 24px;
  text-align: center;
  animation: popIn 0.5s ease-out;
  box-shadow: 0 12px 48px rgba(93, 58, 26, 0.3);
  border: 3px solid #FFD700;
}

.vip-welcome-emoji { font-size: 72px; display: block; margin-bottom: 12px; }
.vip-welcome-title { font-size: 22px; color: #DAA520; margin-bottom: 6px; }
.vip-welcome-desc { font-size: 14px; color: var(--brown); margin-bottom: 4px; }
.vip-welcome-sub { font-size: 12px; color: #C4A882; margin-bottom: 20px; }
.vip-welcome-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #FFD700, #FFA500);
  color: #5D3A1A;
  border: none;
  border-radius: 50px;
  font-family: inherit;
  font-size: 18px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.2s;
}
.vip-welcome-btn:active { transform: scale(0.97); opacity: 0.85; }

/* VIP dish price display */
.vip-price-row { display: flex; align-items: center; justify-content: center; gap: 6px; }
.vip-price-row .current { color: var(--deep-pink); font-size: 18px; }
.vip-price-row .current::before { content: '¥'; font-size: 12px; }
.vip-price-row .original { color: #C4A882; font-size: 12px; text-decoration: line-through; }
.vip-price-row .discount { color: #FFA500; font-size: 11px; }

/* ── Responsive ── */
@media (min-width: 768px) {
  .menu-grid { grid-template-columns: repeat(4, 1fr); max-width: 960px; margin: 0 auto; }
  .categories { max-width: 800px; margin: 0 auto; }
}

/* ── Pig Interaction (long press) ── */
.logo {
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  transition: transform 0.3s;
  position: relative;
}

.pig-reaction {
  position: fixed;
  pointer-events: none;
  z-index: 500;
  font-size: 48px;
  animation: pigReact 1s ease-out forwards;
}

@keyframes pigReact {
  0% { transform: translate(-50%, 0) scale(0.3); opacity: 1; }
  50% { transform: translate(-50%, -40px) scale(1.2); opacity: 1; }
  100% { transform: translate(-50%, -80px) scale(0.6); opacity: 0; }
}

.pig-shake { animation: pigShake 0.4s ease-in-out; }
@keyframes pigShake {
  0%, 100% { transform: translateX(0) rotate(0); }
  20% { transform: translateX(-8px) rotate(-8deg); }
  40% { transform: translateX(8px) rotate(8deg); }
  60% { transform: translateX(-6px) rotate(-5deg); }
  80% { transform: translateX(4px) rotate(3deg); }
}

.pig-spin { animation: pigSpin 0.6s ease-in-out; }
@keyframes pigSpin {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.3); }
  100% { transform: rotate(360deg) scale(1); }
}

.pig-bounce { animation: pigBounce 0.5s ease-in-out; }
@keyframes pigBounce {
  0%, 100% { transform: translateY(0); }
  30% { transform: translateY(-20px); }
  50% { transform: translateY(0); }
  70% { transform: translateY(-10px); }
}

/* ── Countdown Banner ── */
.cook-countdown {
  position: fixed;
  bottom: 100px;
  left: 16px;
  right: 16px;
  background: white;
  border-radius: var(--radius);
  padding: 16px 20px;
  box-shadow: 0 8px 32px rgba(93, 58, 26, 0.15);
  z-index: 350;
  display: flex;
  align-items: center;
  gap: 14px;
  animation: slideUpCountdown 0.4s ease-out;
  border: 2px solid var(--warm-yellow);
}

@keyframes slideUpCountdown {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.cook-icon {
  font-size: 40px;
  animation: pigBounce 1s infinite;
}

.cook-info { flex: 1; }
.cook-title { font-size: 15px; color: var(--dark-brown); font-weight: bold; }
.cook-detail { font-size: 12px; color: var(--brown); margin-top: 2px; }

.cook-timer {
  font-size: 28px;
  font-weight: bold;
  color: var(--deep-pink);
  min-width: 50px;
  text-align: center;
}

.cook-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  background: var(--deep-pink);
  border-radius: 0 0 0 var(--radius);
  transition: width 1s linear;
}

.cook-done .cook-timer { color: #4CAF50; }
.cook-done .cook-icon { animation: none; }

/* ── Theme transition (targeted, GPU-safe) ── */
body, .cat-btn, .modal, .dish-modal, .order-detail {
  transition: background-color 0.6s ease, color 0.6s ease;
}

/* ── Accessibility: respect reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

const HIDDEN_DISHES = [

  { id: 93, name: '三文鱼刺身',     img: U('1579584425555-c3ce17fd4359'), emoji: '🍣', price: 58, cat: '隐藏菜单', vip: true },

  { id: 95, name: '佛跳墙',         img: U('1544025162-d76694265947'), emoji: '🍯', price: 98, cat: '隐藏菜单', vip: true },
];

const CATS = ['全部', '健身餐', '主食', '热菜', '汤品', '饮品'];
const VIP_CATS = ['全部', '健身餐', '主食', '热菜', '汤品', '饮品', '隐藏菜单'];

// VIP
const VIP_KEY = 'zc_vip';
const VIP_DISCOUNT = 0.6; // 6折
let isVip = localStorage.getItem(VIP_KEY) === '1';
let vipWelcomeShown = false;

function getAllDishes() {
  return isVip ? [...DISHES, ...HIDDEN_DISHES] : DISHES;
}

function getCats() {
  return isVip ? VIP_CATS : CATS;
}

function getPrice(price) {
  return isVip ? Math.round(price * VIP_DISCOUNT) : price;
}

let activeCat = '全部';
let cart = {};

const catEl = document.getElementById('categories');
const gridEl = document.getElementById('menuGrid');
const cartCount = document.getElementById('cartCount');
const cartTotal = document.getElementById('cartTotal');
const checkoutBtn = document.getElementById('checkoutBtn');

function renderCategories() {
  catEl.innerHTML = '';
  getCats().forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c === activeCat ? ' active' : '');
    btn.textContent = c;
    if (c === '隐藏菜单') { btn.innerHTML = '👑 ' + c; }
    btn.onclick = () => { activeCat = c; render(); };
    catEl.appendChild(btn);
  });
}

function render() {
  const allDishes = getAllDishes();
  const filtered = activeCat === '全部' ? allDishes : allDishes.filter(d => d.cat === activeCat);
  gridEl.innerHTML = filtered.map(d => {
    const hasNote = cart[d.id] && cart[d.id].note;
    const price = getPrice(d.price);
    const isHidden = d.vip;
    let priceHtml;
    if (isVip && d.price !== price) {
      priceHtml = `<div class="vip-price-row"><span class="original">¥${d.price}</span><span class="current">${price}</span><span class="discount">6折</span></div>`;
    } else {
      priceHtml = `<div class="dish-price">${price}</div>`;
    }
    const imgHtml = d.img
      ? `<div class="food-img-wrap"><img class="food-img" src="${d.img}" alt="${d.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="food-img-fallback">${d.emoji}</span></div>`
      : `<span class="dish-emoji">${d.emoji}</span>`;
    return `
      <div class="dish-card${hasNote ? ' has-note' : ''}${isHidden ? ' vip-only' : ''}" onclick="openDishModal(${d.id})">
        <span class="has-note-dot" title="已加备注"></span>
        ${imgHtml}
        <div class="dish-name">${d.name}</div>
        ${priceHtml}
      </div>
    `;
  }).join('');

  document.querySelectorAll('.cat-btn').forEach(b => {
    const btnText = b.textContent.replace('👑 ', '');
    b.classList.toggle('active', btnText === activeCat);
  });
  updateCartUI();
}

// ── Dish Note Modal ──
function openDishModal(dishId) {
  const allDishes = getAllDishes();
  const d = allDishes.find(x => x.id === dishId);
  const existing = cart[dishId];
  const qty = existing ? existing.qty : 1;
  const note = existing ? existing.note : '';
  const price = getPrice(d.price);
  const priceHtml = (isVip && d.price !== price)
    ? `<div class="big-price" style="text-decoration:line-through;color:#C4A882;font-size:14px;margin-bottom:0">¥${d.price}</div><div class="big-price" style="margin-top:0">¥${price} <span style="font-size:13px;color:#FFA500">(6折)</span></div>`
    : `<div class="big-price">¥${d.price}</div>`;

  const bigImgHtml = d.img
    ? `<div style="width:120px;height:120px;border-radius:16px;overflow:hidden;margin:0 auto 12px"><img src="${d.img}" alt="${d.name}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span style="display:none;font-size:52px;width:100%;height:100%;align-items:center;justify-content:center">${d.emoji}</span></div>`
    : `<span class="big-emoji">${d.emoji}</span>`;

  const html = `
    <div class="dish-modal-overlay" id="dishModalOverlay" onclick="if(event.target===this)closeDishModal()">
      <div class="dish-modal">
        ${bigImgHtml}
        <div class="big-name">${d.name}${d.vip ? ' <span class="vip-tag">👑VIP</span>' : ''}</div>
        ${priceHtml}
        <input class="note-input" id="dishNote" placeholder="💬 添加备注（比如：少油、加辣...）" value="${escapeHtml(note)}" autocomplete="off">
        <div class="qty-row">
          <button class="qty-btn-lg" onclick="changeDishQty(-1)">−</button>
          <span class="qty-num-lg" id="dishQty">${qty}</span>
          <button class="qty-btn-lg" onclick="changeDishQty(1)">+</button>
        </div>
        <button class="add-btn" onclick="confirmAddToCart(${dishId})">
          ${existing ? '更新购物车' : '加入购物车'}
        </button>
        ${existing ? '<button class="cancel-btn" onclick="removeCartItem(' + dishId + ');closeDishModal()">从购物车移除</button>' : '<button class="cancel-btn" onclick="closeDishModal()">再想想</button>'}
      </div>
    </div>
  `;

  document.getElementById('dishModalOverlay')?.remove();
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;
  document.body.appendChild(wrapper.firstElementChild);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function closeDishModal() { document.getElementById('dishModalOverlay')?.remove(); }

function changeDishQty(delta) {
  const el = document.getElementById('dishQty');
  if (!el) return;
  let v = parseInt(el.textContent) + delta;
  if (v < 1) v = 1;
  if (v > 99) v = 99;
  el.textContent = v;
}

function confirmAddToCart(dishId) {
  const qtyEl = document.getElementById('dishQty');
  const noteEl = document.getElementById('dishNote');
  const qty = parseInt(qtyEl.textContent) || 1;
  const note = noteEl.value.trim();
  if (qty <= 0) { closeDishModal(); return; }
  cart[dishId] = { qty, note };
  closeDishModal();
  updateCartUI();
  render();
  cartCount.style.transform = 'scale(1.3)';
  setTimeout(() => { cartCount.style.transform = 'scale(1)'; }, 150);
}

function removeCartItem(dishId) { delete cart[dishId]; updateCartUI(); render(); }

function getCartItems() {
  const allDishes = getAllDishes();
  return Object.entries(cart).map(([id, info]) => {
    const d = allDishes.find(x => x.id === +id);
    if (!d) return null;
    return { ...d, qty: info.qty, note: info.note, vipPrice: getPrice(d.price) };
  }).filter(Boolean);
}

function getTotal() { return getCartItems().reduce((sum, item) => sum + item.vipPrice * item.qty, 0); }
function getTotalOriginal() { return getCartItems().reduce((sum, item) => sum + item.price * item.qty, 0); }
function getTotalCount() { return Object.values(cart).reduce((s, info) => s + info.qty, 0); }

function updateCartUI() {
  const count = getTotalCount();
  const total = getTotal();
  cartCount.textContent = count;
  cartTotal.textContent = '¥' + total;
  checkoutBtn.disabled = count === 0;
}

// ── Checkout Modal ──
checkoutBtn.addEventListener('click', () => {
  const items = getCartItems();
  if (!items.length) return;

  let html = `
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <h2>🛒 确认订单</h2>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
  `;

  items.forEach(item => {
    html += `
      <div class="cart-item">
        <div class="cart-item-main">
          <span style="font-size:28px">${item.emoji}</span>
          <span class="cart-item-name">${item.name}${item.vip ? ' <span class="vip-tag">👑</span>' : ''}</span>
          <span class="cart-item-price">¥${item.vipPrice * item.qty}</span>
          <div class="qty-control">
            <button class="qty-btn" onclick="event.stopPropagation();modCartQty(${item.id},-1);refreshModal()">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="event.stopPropagation();modCartQty(${item.id},1);refreshModal()">+</button>
          </div>
        </div>
        ${item.note ? '<div class="cart-item-note">💬 ' + escapeHtml(item.note) + '</div>' : ''}
      </div>
    `;
  });

  const total = getTotal();
  const totalOriginal = getTotalOriginal();
  const vipDiscountHtml = (isVip && totalOriginal > total)
    ? `<div class="vip-total-row"><span>原价</span><span style="text-decoration:line-through">¥${totalOriginal}</span></div><div class="vip-total-row"><span>👑 VIP 6折</span><span>-¥${totalOriginal - total}</span></div>`
    : '';

  html += `
        ${vipDiscountHtml}
        <div style="text-align:right;padding:${vipDiscountHtml ? '4px' : '16px'} 0 16px;font-size:20px;color:var(--dark-brown)">
          合计：<strong style="color:var(--deep-pink)">¥${total}</strong>
        </div>
        <div class="form-group">
          <label>👤 你的名字</label>
          <input id="orderName" placeholder="比如：妈妈">
        </div>
        <div class="form-group">
          <label>💬 整单备注</label>
          <textarea id="orderNote" placeholder="还有什么要说的吗？"></textarea>
        </div>
        <button class="submit-order-btn" onclick="submitOrder()">哼哼！下单啦</button>
      </div>
    </div>
  `;

  document.getElementById('modalOverlay')?.remove();
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;
  document.body.appendChild(wrapper.firstElementChild);
});

function modCartQty(dishId, delta) {
  if (!cart[dishId]) return;
  cart[dishId].qty += delta;
  if (cart[dishId].qty <= 0) delete cart[dishId];
  updateCartUI();

function startPress(e) {

function cancelPress() {

function triggerPigReaction() {
  const reaction = PIG_REACTIONS[Math.floor(Math.random() * PIG_REACTIONS.length)];
  const animations = ['pig-shake', 'pig-spin', 'pig-bounce'];
  const anim = animations[Math.floor(Math.random() * animations.length)];

  // Animate the logo
  logoEl.classList.remove('pig-shake', 'pig-spin', 'pig-bounce');
  void logoEl.offsetWidth;
  logoEl.classList.add(anim);

  // Floating reaction bubble
  const rect = logoEl.getBoundingClientRect();
  const bubble = document.createElement('div');
  bubble.className = 'pig-reaction';
  bubble.style.left = (rect.left + rect.width / 2) + 'px';
  bubble.style.top = (rect.top - 10) + 'px';
  bubble.innerHTML = reaction.emoji;
  document.body.appendChild(bubble);
  setTimeout(() => bubble.remove(), 1100);

  // Show text near logo
  const txt = document.createElement('div');
  txt.className = 'pig-reaction';
  txt.style.left = (rect.left + rect.width / 2) + 'px';
  txt.style.top = (rect.top + 20) + 'px';

  txt.style.borderRadius = '50px';
  txt.textContent = reaction.text;

  setTimeout(() => txt.remove(), 1100);

  // Temporary emoji swap
  const orig = logoEl.textContent;
  logoEl.textContent = reaction.emoji;
  setTimeout(() => { logoEl.textContent = orig; }, 800);
}

//  Feature 7: 烹饪倒计时
// ════════════════════════════════════════
let cookTimerId = null;

function showCookCountdown() {
  const banner = document.getElementById('cookBanner');
  const timerEl = document.getElementById('cookTimer');
  const progressEl = document.getElementById('cookProgress');
  const iconEl = document.getElementById('cookIcon');
  const titleEl = document.getElementById('cookTitle');
  const detailEl = document.getElementById('cookDetail');

  const totalSeconds = Math.floor(Math.random() * 26) + 15; // 15-40 min
  let remaining = totalSeconds;

  banner.style.display = 'flex';
  banner.classList.remove('cook-done');
  progressEl.style.width = '100%';
  iconEl.textContent = '🐷';
  titleEl.textContent = '大厨收到订单！';
  updateTimerDisplay();

  const cookingMsgs = ['备菜中...', '食材处理中...', '下锅啦~', '翻炒中🔥', '收汁中...', '装盘啦🍽️', '马上就好！'];
  let msgIdx = 0;
  const msgInterval = Math.floor(totalSeconds * 1000 / cookingMsgs.length);

  if (cookTimerId) clearInterval(cookTimerId);

  cookTimerId = setInterval(() => {
    remaining--;
    updateTimerDisplay();

    const pct = (remaining / totalSeconds * 100);
    progressEl.style.width = pct + '%';

    const newMsgIdx = Math.floor((totalSeconds - remaining) / totalSeconds * cookingMsgs.length);
    if (newMsgIdx !== msgIdx && newMsgIdx < cookingMsgs.length) {
      msgIdx = newMsgIdx;
      detailEl.textContent = cookingMsgs[msgIdx];
    }

    if (remaining <= 0) {
      clearInterval(cookTimerId);
      cookTimerId = null;
      banner.classList.add('cook-done');
      iconEl.textContent = '🍽️';
      titleEl.textContent = '出锅啦！';
      detailEl.textContent = '快去端菜吧~';
      timerEl.textContent = '✓';
      progressEl.style.width = '0%';
      progressEl.style.background = '#4CAF50';
      // Auto-hide after 8 seconds
      setTimeout(() => { banner.style.display = 'none'; }, 8000);
    }
  }, 1000);

  function updateTimerDisplay() {
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    timerEl.textContent = m + ':' + String(s).padStart(2, '0');
  }
}

// Hide countdown on tap
document.getElementById('cookBanner').addEventListener('click', () => {
  const banner = document.getElementById('cookBanner');
  if (banner.classList.contains('cook-done')) {
    banner.style.display = 'none';
    if (cookTimerId) { clearInterval(cookTimerId); cookTimerId = null; }
  }
});

function getTimeTheme() {
  const h = new Date().getHours();
  if (h >= 5 && h < 11) return 'morning';
  if (h >= 11 && h < 17) return 'noon';
  if (h >= 17 && h < 22) return 'evening';
  return 'night';
}

function applyTheme(themeKey) {
  const t = THEMES[themeKey];
  const root = document.documentElement;

  root.style.setProperty('--deep-pink', t.deepPink);
  root.style.setProperty('--pink', t.pink);
  root.style.setProperty('--warm-yellow', t.warmYellow);
  root.style.setProperty('--blob1', t.blob1);
  root.style.setProperty('--blob2', t.blob2);
  root.style.setProperty('--blob3', t.blob3);
  document.body.style.backgroundColor = t.bg;

  document.getElementById('themeIndicator').textContent = t.name;
}

  });

// Scroll-reveal: cards fade+slide in as they enter viewport
if ('IntersectionObserver' in window) {
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.style.opacity = '1';
        e.target.style.transform = 'translateZ(0) translateY(0)';
      }
    });
  }, { threshold: 0.1 });

  // Patch render to observe new cards
  const origRender = render;
  render = function() {
    origRender();
    requestAnimationFrame(() => {
      gridEl.querySelectorAll('.dish-card').forEach((card, i) => {
        card.style.opacity = '0';
        card.style.transform = 'translateZ(0) translateY(20px)';
        card.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
        card.style.transitionDelay = (i % 8) * 0.03 + 's';
        revealObserver.observe(card);
      });
    });
  };
}
